<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}DiabetesAI{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <!-- Fraunces: dramatic optical serif for headings | Manrope: precise technical sans for body -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,600&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  {% block head_extra %}{% endblock %}

<style>
/* ═══════════════════ TOKENS */
:root {
  --ink:      #0a0d14;
  --ink-1:    #111827;
  --ink-2:    #1c2333;
  --ink-3:    #252f42;
  --sur:      rgba(17,24,39,.82);
  --sur2:     rgba(28,35,51,.6);
  --bdr:      rgba(255,255,255,.07);
  --bdr2:     rgba(255,255,255,.04);

  --azure:    #3d7fff;
  --azure-l:  #7aabff;
  --azure-d:  #1e5bd8;
  --ice:      #00d4ff;
  --mint:     #0fd4a0;
  --gold:     #f5b100;
  --coral:    #ff4d6d;
  --lavender: #b197fc;

  --text:   #e8edf7;
  --text-2: #8b95a9;
  --text-3: #566070;

  --fh: 'Fraunces', Georgia, serif;
  --fb: 'Manrope', system-ui, sans-serif;

  --r:  16px;
  --rs: 10px;
  --rx: 24px;
}

/* ═══════════════════ RESET */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--ink);color:var(--text);
  font-family:var(--fb);font-size:15px;line-height:1.65;
  min-height:100vh;overflow-x:hidden;
}

/* ═══════════════════ BG TEXTURE */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80vw 60vh at 15% 10%, rgba(61,127,255,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60vw 60vh at 85% 80%, rgba(0,212,255,.04) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='32' height='32' viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.5' fill='rgba(255,255,255,0.018)'/%3E%3C/svg%3E") repeat;
}

/* ═══════════════════ NAV */
.nav{
  position:sticky;top:0;z-index:900;
  background:rgba(10,13,20,.88);
  backdrop-filter:blur(24px) saturate(160%);
  border-bottom:1px solid var(--bdr);
}
.nav-in{
  max-width:1320px;margin:0 auto;padding:0 2.5rem;
  display:flex;align-items:center;justify-content:space-between;height:62px;
}
.nav-logo{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;
}
.nav-logo-mark{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--azure),var(--ice));
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;color:white;
  box-shadow:0 2px 12px rgba(61,127,255,.4);
}
.nav-logo-txt{
  font-family:var(--fh);font-size:1.2rem;font-weight:700;
  color:var(--text);letter-spacing:-.01em;
}
.nav-logo-txt em{font-style:italic;color:var(--azure-l)}
.nav-links{display:flex;align-items:center;gap:.15rem;list-style:none}
.nav-links a{
  display:flex;align-items:center;gap:.4rem;
  padding:.42rem .9rem;border-radius:var(--rs);
  color:var(--text-2);text-decoration:none;
  font-size:.84rem;font-weight:500;letter-spacing:.01em;
  transition:color .2s,background .2s;
}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-links a.active{color:var(--azure-l);background:rgba(61,127,255,.1)}
.nav-links a i{font-size:.78rem;opacity:.7}
.nav-pill{
  padding:.42rem 1.15rem;border-radius:var(--rs);
  background:linear-gradient(135deg,var(--azure),var(--azure-d));
  color:white!important;font-weight:600!important;
  font-size:.84rem!important;
  box-shadow:0 2px 14px rgba(61,127,255,.38);
}
.nav-pill:hover{opacity:.9;background:rgba(61,127,255,.15)!important}

/* ═══════════════════ MAIN */
main{position:relative;z-index:1}

/* ═══════════════════ CONTAINERS */
.c    {max-width:1320px;margin:0 auto;padding:0 2.5rem}
.c-md {max-width:1100px;margin:0 auto;padding:0 2.5rem}
.c-sm {max-width:860px; margin:0 auto;padding:0 2.5rem}
@media(max-width:680px){.c,.c-md,.c-sm{padding:0 1.25rem}}

/* ═══════════════════ CARDS */
.card{
  background:var(--sur);border:1px solid var(--bdr);
  border-radius:var(--r);backdrop-filter:blur(20px);
}
.card-p{padding:2rem}
.card-p-sm{padding:1.5rem}
.card-lift{transition:transform .25s,border-color .25s,box-shadow .25s}
.card-lift:hover{transform:translateY(-4px);border-color:rgba(61,127,255,.22);box-shadow:0 16px 48px rgba(0,0,0,.35)}

/* ═══════════════════ SECTION */
.sec{padding:5rem 0}
.sec-sm{padding:3rem 0}

/* ═══════════════════ TYPE */
h1,h2,h3,h4{font-family:var(--fh);line-height:1.15;font-weight:700}
.d1{font-size:clamp(2.6rem,5.5vw,4.4rem);font-weight:800;font-family:var(--fh)}
.d2{font-size:clamp(1.8rem,3.5vw,3rem);font-weight:800;font-family:var(--fh)}
.d3{font-size:clamp(1.4rem,2.5vw,2rem);font-weight:700;font-family:var(--fh)}
.lead{font-size:1.08rem;color:var(--text-2);line-height:1.8}
.eyebrow{
  font-family:var(--fb);font-size:.72rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--azure-l);
  margin-bottom:.85rem;display:block;
}
.shine{
  background:linear-gradient(135deg,var(--azure-l) 0%,var(--ice) 50%,var(--mint) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.muted{color:var(--text-2)}
.small{font-size:.82rem}

/* ═══════════════════ BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.65rem 1.4rem;border-radius:var(--rs);
  font-size:.875rem;font-weight:600;font-family:var(--fb);
  cursor:pointer;border:none;text-decoration:none;white-space:nowrap;
  transition:all .22s cubic-bezier(.4,0,.2,1);
}
.btn-primary{
  background:linear-gradient(135deg,var(--azure),var(--azure-d));
  color:white;box-shadow:0 2px 18px rgba(61,127,255,.38);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(61,127,255,.55)}
.btn-ghost{
  background:var(--sur2);color:var(--text);
  border:1px solid var(--bdr);
}
.btn-ghost:hover{background:var(--ink-3)}
.btn-green{
  background:linear-gradient(135deg,var(--mint),#0aaa80);
  color:white;box-shadow:0 2px 16px rgba(15,212,160,.3);
}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(15,212,160,.45)}
.btn-lg{padding:.85rem 2rem;font-size:.95rem;border-radius:var(--r)}
.btn-xl{padding:1rem 2.4rem;font-size:1rem;border-radius:var(--r)}
.btn:active{transform:translateY(0)!important}
.btn-loading{opacity:.6;pointer-events:none}

/* ═══════════════════ BADGE */
.badge{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.28rem .8rem;border-radius:50px;
  font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  font-family:var(--fb);
}
.badge-blue{background:rgba(61,127,255,.1);color:var(--azure-l);border:1px solid rgba(61,127,255,.22)}
.badge-mint{background:rgba(15,212,160,.1);color:#34d4b0;border:1px solid rgba(15,212,160,.22)}
.badge-gold{background:rgba(245,177,0,.1);color:#f9cc3e;border:1px solid rgba(245,177,0,.22)}
.badge-coral{background:rgba(255,77,109,.1);color:#ff7fa0;border:1px solid rgba(255,77,109,.22)}

/* ═══════════════════ DIVIDER */
.div{height:1px;background:var(--bdr);margin:2rem 0}

/* ═══════════════════ SPINNER */
.spin{
  width:17px;height:17px;
  border:2.5px solid rgba(255,255,255,.2);
  border-top-color:white;border-radius:50%;
  animation:_sp .65s linear infinite;flex-shrink:0;
}
@keyframes _sp{to{transform:rotate(360deg)}}

/* ═══════════════════ TOAST */
#toast{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;
  min-width:240px;max-width:360px;
  padding:.85rem 1.3rem;border-radius:var(--r);
  font-size:.875rem;font-weight:500;font-family:var(--fb);
  color:white;backdrop-filter:blur(20px);display:none;
  transform:translateY(16px);opacity:0;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
#toast.show{transform:translateY(0);opacity:1}

/* ═══════════════════ REVEAL */
.rv{opacity:0;transform:translateY(20px);transition:opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.4,0,.2,1)}
.rv.in{opacity:1;transform:translateY(0)}
.d1r{transition-delay:.07s}.d2r{transition-delay:.14s}
.d3r{transition-delay:.21s}.d4r{transition-delay:.28s}.d5r{transition-delay:.35s}

/* ═══════════════════ FOOTER */
.footer{
  position:relative;z-index:1;
  border-top:1px solid var(--bdr);
  background:rgba(10,13,20,.6);
  padding:2.25rem 0;
}
.footer-in{
  max-width:1320px;margin:0 auto;padding:0 2.5rem;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:.75rem;
}
.footer-copy{font-size:.8rem;color:var(--text-3)}
.footer-links{display:flex;gap:1.5rem}
.footer-links a{font-size:.8rem;color:var(--text-3);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--text-2)}

/* ═══════════════════ SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--ink-3);border-radius:3px}

/* ═══════════════════ UTILITIES */
.flex{display:flex}.flex-c{display:flex;align-items:center;justify-content:center}
.g1{gap:.5rem}.g2{gap:1rem}.g3{gap:1.5rem}.g4{gap:2rem}
.mt1{margin-top:.5rem}.mt2{margin-top:1rem}.mt3{margin-top:1.5rem}.mt4{margin-top:2rem}
.mb1{margin-bottom:.5rem}.mb2{margin-bottom:1rem}.mb3{margin-bottom:1.5rem}
.tc{text-align:center}

@media(max-width:768px){
  .nav-links{display:none}
  .sec{padding:3rem 0}
  .d1{font-size:2.2rem}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-in">
    <a href="/" class="nav-logo">
      <div class="nav-logo-mark"><i class="fas fa-heartbeat"></i></div>
      <span class="nav-logo-txt">Diabetes<em>AI</em></span>
    </a>
    <ul class="nav-links">
      <li><a href="/" class="{% if active=='home' %}active{% endif %}"><i class="fas fa-house"></i> Home</a></li>
      <li><a href="/predict" class="{% if active=='predict' or active=='result' %}active{% endif %}"><i class="fas fa-brain"></i> Predict</a></li>
      <li><a href="/analytics" class="{% if active=='analytics' %}active{% endif %}"><i class="fas fa-chart-line"></i> Analytics</a></li>
      <li><a href="/about" class="{% if active=='about' %}active{% endif %}"><i class="fas fa-circle-info"></i> About</a></li>
      <li><a href="/predict" class="nav-pill"><i class="fas fa-flask"></i> Start Analysis</a></li>
    </ul>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer class="footer">
  <div class="footer-in">
    <span class="footer-copy">© 2026 DiabetesAI &nbsp;·&nbsp; <span style="color:rgba(255,77,109,.7)">⚕ Informational only — not medical advice.</span></span>
    <div class="footer-links">
      <a href="/about">About</a>
      <a href="/analytics">Analytics</a>
      <a href="/predict">Predict</a>
    </div>
  </div>
</footer>

<div id="toast"></div>

<script>
function showToast(msg, type='error'){
  const t=document.getElementById('toast');
  const c={error:'rgba(255,77,109,.95)',success:'rgba(15,212,160,.9)',info:'rgba(61,127,255,.9)'};
  t.textContent=msg;t.style.background=c[type]||c.error;
  t.style.display='block';
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.style.display='none',380)},3800);
}
const _obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('in')})},{threshold:.07});
document.querySelectorAll('.rv').forEach(el=>_obs.observe(el));
</script>
{% block scripts %}{% endblock %}
</body>
</html>
